<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Workspaces UI kit — Shell + Board</title>
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="screens.css">
<script defer src="https://unpkg.com/@fortawesome/fontawesome-free@6.5.2/js/all.min.js" data-mutate-approach="sync" data-auto-replace-svg="true" data-observe-mutations="true"></script>
<style>
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body { font-family: var(--font-sans); background: var(--background); color: var(--title); -webkit-font-smoothing: antialiased; }
#root { height: 100%; }
button { font-family: inherit; cursor: pointer; }

/* ============ KIT CHROME ============ */
.ws-root { height: 100%; display: flex; flex-direction: column; background: #1b1f27; }
.ws-kitbar { height: 52px; flex: none; display: flex; align-items: center; justify-content: space-between;
  padding: 0 18px; background: #14171e; color: #e7ecf3; border-bottom: 1px solid #262b35; }
.ws-kitbar-l { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600; }
.ws-kitbar-logo { width: 22px; height: 22px; border-radius: 6px; }
.ws-kitbar-sub { font-size: 11px; font-weight: 500; color: #8893a4; padding: 2px 8px; border: 1px solid #2c323d; border-radius: 999px; }
.ws-kitbar-r { display: flex; align-items: center; gap: 10px; }
.ws-seg { display: flex; background: #1f242d; border: 1px solid #2c323d; border-radius: 10px; padding: 3px; gap: 2px; }
.ws-seg button { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: #8893a4;
  background: transparent; border: none; border-radius: 7px; padding: 5px 11px; }
.ws-seg button.is-on { background: var(--primary); color: #fff; }
.ws-viewport { flex: 1; min-height: 0; overflow: hidden; }
.ws-viewport-desktop { padding: 0; }
.ws-viewport-desktop .ws-app { height: 100%; }
.ws-viewport-phone { display: flex; align-items: center; justify-content: center; padding: 20px; overflow: auto; }
.ws-phoneframe { width: 390px; height: 800px; max-height: 100%; border-radius: 44px; background: #05070b;
  padding: 12px; box-shadow: 0 30px 70px rgba(0,0,0,.5); border: 1px solid #2c323d; flex: none; }
.ws-phonescreen { width: 100%; height: 100%; border-radius: 32px; overflow: hidden; background: var(--background); position: relative; }

/* ============ APP SHELL (desktop) ============ */
.ws-app { display: flex; background: var(--background); }
.ws-main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.ws-stage { flex: 1; min-height: 0; display: flex; }
.ws-content { flex: 1; min-width: 0; display: flex; flex-direction: column; }

/* ---- Nav rail ---- */
.ws-rail { width: 56px; flex: none; background: var(--container1); border-right: 1px solid var(--container1-border);
  display: flex; flex-direction: column; padding: 10px 8px; gap: 4px; transition: width .2s ease; }
.ws-rail.is-expanded { width: 248px; }
.ws-rail-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; min-height: 36px; }
.ws-rail-brand { display: flex; align-items: center; gap: 9px; min-width: 0; padding-left: 2px; }
.ws-rail-logo { width: 30px; height: 30px; border-radius: 9px; flex: none; }
.ws-rail-name { font-size: 14px; font-weight: 600; color: var(--title); white-space: nowrap; }
.ws-rail-fold { width: 28px; height: 28px; border: none; background: transparent; color: var(--muted); border-radius: 8px; display: none; }
.ws-rail.is-expanded .ws-rail-fold { display: inline-flex; align-items: center; justify-content: center; }
.ws-rail-fold:hover { background: var(--container1-hover); color: var(--title); }
.ws-rail:not(.is-expanded) .ws-rail-top { flex-direction: column; gap: 8px; }
.ws-rail-items { display: flex; flex-direction: column; gap: 3px; }
.ws-rail-bottom { margin-top: auto; display: flex; flex-direction: column; gap: 3px; }
.ws-nav-item { position: relative; display: flex; align-items: center; gap: 12px; height: 40px; padding: 0 9px;
  border: none; background: transparent; border-radius: 11px; color: var(--common); font-size: 13.5px; font-weight: 500; width: 100%; }
.ws-nav-item:hover { background: var(--container1-hover); color: var(--title); }
.ws-nav-item.is-active { background: var(--container2); color: var(--title); }
.ws-nav-ic { position: relative; width: 22px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex: none; }
.ws-nav-badge { position: absolute; top: -6px; right: -8px; background: var(--primary); color: #fff; font-size: 9px;
  font-weight: 700; min-width: 15px; height: 15px; border-radius: 999px; display: flex; align-items: center; justify-content: center; padding: 0 3px; }
.ws-nav-lab { white-space: nowrap; }
.ws-nav-tip { position: absolute; left: calc(100% + 10px); top: 50%; transform: translateY(-50%) scale(.92);
  background: var(--container2); border: 1px solid var(--container2-border); color: var(--title); font-size: 12px; font-weight: 500;
  padding: 5px 9px; border-radius: 9px; white-space: nowrap; box-shadow: var(--shadow-pop); opacity: 0; pointer-events: none;
  transition: all .15s ease; z-index: 60; }
.ws-rail:not(.is-expanded) .ws-nav-item:hover .ws-nav-tip { opacity: 1; transform: translateY(-50%) scale(1); }

/* ---- Top bar ---- */
.ws-top { height: 56px; flex: none; display: flex; align-items: center; gap: 14px; padding: 0 16px;
  background: var(--container1); border-bottom: 1px solid var(--container1-border); }
.ws-top-burger { display: none; width: 36px; height: 36px; border: none; background: transparent; color: var(--title); border-radius: 9px; font-size: 17px; }
.ws-top-switchers { display: flex; align-items: center; gap: 8px; }
.ws-top-sep { color: var(--disabled); }
.ws-ws-trigger { display: flex; align-items: center; gap: 9px; height: 38px; padding: 0 11px; border-radius: 11px;
  border: 1px solid var(--container1-border); background: var(--container1); color: var(--title); font-size: 13.5px; font-weight: 600; }
.ws-ws-trigger:hover { background: var(--container1-hover); }
.ws-ws-badge { width: 22px; height: 22px; border-radius: 7px; background: var(--primary); color: #fff;
  display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex: none; }
.ws-ws-badge.sm { width: 18px; height: 18px; font-size: 10px; border-radius: 6px; }
.ws-ws-badge.alt { background: var(--secondary); }
.ws-ws-name { white-space: nowrap; }
.ws-cmdk { display: flex; align-items: center; gap: 9px; height: 38px; padding: 0 12px; min-width: 180px;
  border: 1px solid var(--container1-border); background: var(--container2); color: var(--muted); border-radius: 11px; font-size: 13px; }
.ws-cmdk:hover { background: var(--container2-hover); }
.ws-cmdk kbd { margin-left: auto; font-family: var(--font-mono); font-size: 11px; background: var(--container1);
  border: 1px solid var(--container1-border); border-radius: 6px; padding: 1px 6px; color: var(--common); }
.ws-top-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.ws-presence { padding-right: 2px; }
.ws-top-avatar { width: 30px; height: 30px; border-radius: 50%; overflow: hidden; cursor: pointer; }

/* ---- Tab / session bar ---- */
.ws-tabs { height: 44px; flex: none; display: flex; align-items: stretch; gap: 8px; padding: 0 10px;
  background: var(--background); border-bottom: 1px solid var(--container1-border); }
.ws-tabs-list { display: flex; align-items: center; gap: 4px; min-width: 0; overflow-x: auto; flex: 1; }
.ws-tab { display: flex; align-items: center; gap: 8px; height: 32px; margin-top: 6px; padding: 0 9px 0 11px; border-radius: 10px 10px 0 0;
  background: transparent; color: var(--common); font-size: 12.5px; font-weight: 500; white-space: nowrap; cursor: pointer; border: 1px solid transparent; border-bottom: none; }
.ws-tab:hover { background: var(--container1-hover); }
.ws-tab.is-active { background: var(--container1); color: var(--title); border-color: var(--container1-border); height: 38px; margin-top: 6px; }
.ws-tab-ic { font-size: 12px; color: var(--muted); }
.ws-tab.is-active .ws-tab-ic { color: var(--primary); }
.ws-tab-dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
.ws-tab-label { font-family: var(--font-mono); font-size: 11.5px; letter-spacing: -.01em; }
.ws-tab:first-child .ws-tab-label { font-family: var(--font-sans); font-size: 12.5px; }
.ws-tab-x { width: 18px; height: 18px; border: none; background: transparent; color: var(--muted); border-radius: 6px; font-size: 11px; display: inline-flex; align-items: center; justify-content: center; }
.ws-tab-x:hover { background: var(--container2-hover); color: var(--title); }
.ws-tab-add { width: 28px; height: 28px; margin-top: 8px; border: none; background: transparent; color: var(--muted); border-radius: 8px; font-size: 13px; flex: none; }
.ws-tab-add:hover { background: var(--container1-hover); color: var(--title); }
.ws-ai-toggle { display: flex; align-items: center; gap: 8px; align-self: center; height: 32px; padding: 0 12px; border-radius: 10px;
  border: 1px solid var(--container1-border); background: var(--container1); color: var(--common); font-size: 12.5px; font-weight: 600; flex: none; }
.ws-ai-toggle:hover { background: var(--container1-hover); color: var(--title); }
.ws-ai-count { background: var(--primary); color: #fff; font-size: 10px; font-weight: 700; min-width: 16px; height: 16px;
  border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; padding: 0 4px; }

/* ============ BOARD ============ */
.ws-board-head { display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 18px 22px 14px; flex: none; }
.ws-board-title { display: flex; align-items: baseline; gap: 11px; }
.ws-board-h1 { font-size: 21px; font-weight: 600; letter-spacing: -.01em; }
.ws-board-sub { font-family: var(--font-mono); font-size: 12.5px; color: var(--muted); }
.ws-board-tools { display: flex; align-items: center; gap: 9px; }
.ws-board-scroll { flex: 1; min-height: 0; overflow-x: auto; overflow-y: hidden; padding: 0 22px 22px; }
.ws-board-cols { display: flex; gap: 14px; height: 100%; min-width: min-content; }
.ws-col { width: 268px; flex: none; display: flex; flex-direction: column; background: var(--container1);
  border: 1px solid var(--container1-border); border-radius: 16px; max-height: 100%; }
.ws-col-noai { background: color-mix(in srgb, var(--container1) 70%, var(--background)); }
.ws-col-head { display: flex; align-items: center; justify-content: space-between; padding: 13px 14px 9px; flex: none; }
.ws-col-headl { display: flex; align-items: center; gap: 8px; }
.ws-col-name { font-size: 13px; font-weight: 600; color: var(--title); }
.ws-col-count { font-size: 11px; font-weight: 600; color: var(--muted); background: var(--container2); border-radius: 999px; padding: 1px 7px; }
.ws-col-ai { font-size: 11px; color: var(--primary); opacity: .85; }
.ws-col-add { width: 24px; height: 24px; border: none; background: transparent; color: var(--muted); border-radius: 7px; font-size: 12px; }
.ws-col-add:hover { background: var(--container2-hover); color: var(--title); }
.ws-col-list { flex: 1; min-height: 0; overflow-y: auto; padding: 4px 10px 12px; display: flex; flex-direction: column; gap: 9px; }
.ws-col-empty { font-size: 12px; color: var(--muted); text-align: center; padding: 18px 0; }
.ws-col-addcard { display: flex; align-items: center; justify-content: center; gap: 7px; width: 100%; padding: 10px; border: 1px dashed var(--container2-border); background: transparent; color: var(--muted); border-radius: 12px; font-size: 12.5px; font-weight: 600; margin-top: 2px; }
.ws-col-addcard:hover { background: var(--container1-hover); color: var(--title); border-color: var(--container2-hover); }

/* Kanban card */
.ws-card { background: var(--container1); border: 1px solid var(--container1-border); border-radius: 13px; padding: 12px 13px;
  display: flex; flex-direction: column; gap: 9px; box-shadow: var(--shadow-card); transition: box-shadow .16s ease, transform .16s ease; }
.ws-col-noai .ws-card { background: var(--container1); }
.ws-card:hover { box-shadow: var(--shadow-card-hover); transform: translateY(-1px); }
@media (prefers-reduced-motion: reduce) { .ws-card:hover { transform: none; } }
.ws-card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.ws-card-id { font-family: var(--font-mono); font-size: 11px; font-weight: 500; color: var(--muted); }
.ws-card-noai { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; color: var(--muted); }
.ws-card-title { font-size: 13.5px; font-weight: 600; color: var(--title); line-height: 1.4; text-wrap: pretty; }
.ws-card-labels { display: flex; flex-wrap: wrap; gap: 6px; }
.ws-card-foot { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 1px; min-height: 22px; }
.ws-card-unassigned { font-size: 11px; color: var(--disabled); }
.ws-card-live { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; color: var(--correct); }
.ws-card-live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--correct); }

/* ============ AVATARS / PILLS / LABELS / BUTTONS ============ */
.ws-avatar { border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center;
  font-weight: 600; user-select: none; flex: none; }
.ws-avstack { display: flex; align-items: center; }
.ws-avstack-item { border-radius: 50%; border: 2px solid var(--container1); }
.ws-avstack-more { background: var(--container2); color: var(--common); display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 600; }
.ws-pill { display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 3px 10px; font-size: 11px; font-weight: 600; line-height: 1.3; white-space: nowrap; }
.ws-pill-dot { width: 6px; height: 6px; border-radius: 50%; flex: none; }
.ws-label-chip { border-radius: 999px; padding: 2px 9px; font-size: 10.5px; font-weight: 600; line-height: 1.3; }
.ws-btn { display: inline-flex; align-items: center; gap: 7px; height: 38px; padding: 0 15px; border-radius: 11px;
  font-size: 13.5px; font-weight: 600; border: 1px solid transparent; white-space: nowrap; }
.ws-btn-primary { background: var(--primary); color: var(--title-primary); }
.ws-btn-primary:hover { background: var(--primary-hover); }
.ws-btn-secondary { background: var(--container2); color: var(--title); border-color: var(--container2-border); }
.ws-btn-secondary:hover { background: var(--container2-hover); }
.ws-btn-danger { background: var(--wrong); color: #fff; }
.ws-btn-ghost { background: transparent; color: var(--common); }
.ws-btn-ghost:hover { background: var(--container2); color: var(--title); }
.ws-iconbtn { width: 38px; height: 38px; border: 1px solid var(--container1-border); background: var(--container1); color: var(--common);
  border-radius: 11px; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; }
.ws-iconbtn:hover { background: var(--container1-hover); color: var(--title); }
.ws-iconbtn.is-active { background: var(--container2); color: var(--title); }

/* ============ DROPDOWN ============ */
.ws-dd { position: relative; }
.ws-dd-trigger { display: flex; align-items: center; gap: 8px; height: 38px; padding: 0 11px; border-radius: 11px;
  border: 1px solid var(--container1-border); background: var(--container1); color: var(--title); font-size: 13px; font-weight: 500; }
.ws-dd-trigger:hover { background: var(--container1-hover); }
.ws-dd-leadicon { color: var(--muted); font-size: 12px; }
.ws-dd-caret { color: var(--muted); font-size: 11px; transition: transform .2s ease; }
.ws-dd-caret.is-open { transform: rotate(180deg); }
.ws-dd-menu { position: absolute; top: calc(100% + 6px); left: 0; z-index: 60; min-width: 200px; background: var(--container1);
  border: 1px solid var(--container1-border); border-radius: 14px; box-shadow: var(--shadow-pop); padding: 6px;
  transform-origin: top left; animation: ws-menu-in .17s cubic-bezier(0.16, 1, 0.3, 1); }
.ws-dd-menu.is-right { left: auto; right: 0; transform-origin: top right; }
@keyframes ws-menu-in { from { opacity: 0; transform: translateY(-6px) scale(0.96); } }
.ws-dd-section { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); padding: 6px 9px 4px; }
.ws-dd-opt { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 8px 9px; border-radius: 9px;
  font-size: 13px; color: var(--title); }
.ws-dd-opt > span:first-child { display: flex; align-items: center; gap: 8px; }
.ws-dd-opt:hover { background: var(--container1-hover); }
.ws-dd-opt.is-sel { background: var(--container2); font-weight: 600; }
.ws-dd-check { color: var(--primary); font-size: 12px; }
.ws-dd-divider { height: 1px; background: var(--divider); margin: 5px 4px; }
.ws-rolechip { font-size: 10.5px; font-weight: 600; color: var(--muted); background: var(--container2); border-radius: 999px; padding: 1px 8px; }
.ws-dd-search { display: flex; align-items: center; gap: 8px; padding: 6px 9px 8px; border-bottom: 1px solid var(--divider); color: var(--muted); margin-bottom: 4px; }
.ws-dd-search input { flex: 1; border: none; background: none; font-size: 13px; color: var(--title); font-family: var(--font-sans); }
.ws-dd-search input:focus { outline: none; }
.ws-dd-empty { padding: 10px; text-align: center; font-size: 12.5px; color: var(--muted); }

/* ============ AI PANEL ============ */
.ws-ai { width: 320px; flex: none; background: var(--container1); border-left: 1px solid var(--container1-border);
  display: flex; flex-direction: column; }
.ws-ai-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 14px 10px; }
.ws-ai-headl { display: flex; align-items: center; gap: 9px; font-size: 14px; font-weight: 600; }
.ws-ai-bot { width: 26px; height: 26px; border-radius: 50%; background: rgba(59,130,246,.12); color: var(--primary);
  display: inline-flex; align-items: center; justify-content: center; font-size: 13px; }
.ws-ai-bot.sm { width: 22px; height: 22px; font-size: 11px; flex: none; }
.ws-ai-tabs { display: flex; gap: 4px; padding: 0 12px 10px; border-bottom: 1px solid var(--divider); }
.ws-ai-tabs span { font-size: 12px; font-weight: 600; color: var(--muted); padding: 5px 8px; border-radius: 8px; }
.ws-ai-tabs span.is-active { color: var(--title); background: var(--container2); }
.ws-ai-list { flex: 1; min-height: 0; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 11px; }
.ws-ai-card { background: var(--container2); border: 1px solid var(--container2-border); border-radius: 14px; padding: 13px; display: flex; flex-direction: column; gap: 9px; }
.ws-ai-card-top { display: flex; align-items: flex-start; gap: 9px; }
.ws-ai-card-title { font-size: 13px; font-weight: 600; color: var(--title); line-height: 1.35; }
.ws-ai-card-body { margin: 0; font-size: 12.5px; line-height: 1.5; color: var(--common); }
.ws-ai-card-tickets { display: flex; flex-wrap: wrap; gap: 6px; }
.ws-ai-tk { font-family: var(--font-mono); font-size: 11px; font-weight: 500; color: var(--primary); background: rgba(59,130,246,.1); border-radius: 7px; padding: 2px 7px; }
.ws-ai-card-acts { display: flex; align-items: center; gap: 8px; }
.ws-ai-card-acts .ws-btn { height: 32px; padding: 0 13px; font-size: 12.5px; }
.ws-ai-snooze { width: 32px; height: 32px; border: 1px solid var(--container2-border); background: var(--container1); color: var(--muted); border-radius: 9px; margin-left: auto; }
.ws-ai-snooze:hover { color: var(--title); }

/* ============ EMPTY STATE ============ */
.ws-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 7px; padding: 40px 20px; text-align: center; }
.ws-empty-ic { font-size: 28px; color: var(--disabled); margin-bottom: 4px; }
.ws-empty-t { font-size: 15px; font-weight: 600; color: var(--title); }
.ws-empty-s { font-size: 13px; color: var(--muted); }

/* ============ TICKET STUB ============ */
.ws-tstub { padding: 22px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
.ws-tstub-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
.ws-tstub-id { font-family: var(--font-mono); font-size: 12px; color: var(--muted); }
.ws-tstub-title { margin: 4px 0 0; font-size: 20px; font-weight: 600; letter-spacing: -.01em; max-width: 640px; }
.ws-tstub-meta { display: flex; flex-wrap: wrap; gap: 16px; font-size: 12.5px; color: var(--common); }
.ws-tstub-meta i { color: var(--muted); margin-right: 6px; }
.ws-tstub-note { display: flex; gap: 10px; font-size: 13px; line-height: 1.55; color: var(--common); background: var(--container2);
  border: 1px solid var(--container2-border); border-radius: 14px; padding: 14px 16px; max-width: 680px; }
.ws-tstub-note i { color: var(--primary); margin-top: 2px; }

/* ============ MOBILE ============ */
.ws-phoneapp { height: 100%; display: flex; flex-direction: column; background: var(--background); }
.ws-mtop { height: 52px; flex: none; display: flex; align-items: center; gap: 10px; padding: 0 12px;
  background: var(--container1); border-bottom: 1px solid var(--container1-border); }
.ws-mtop .ws-iconbtn { width: 36px; height: 36px; border: none; background: transparent; }
.ws-mtop-ws { display: flex; align-items: center; gap: 7px; font-size: 13.5px; font-weight: 600; color: var(--title);
  background: transparent; border: none; }
.ws-mtop-ws i { color: var(--muted); font-size: 11px; }
.ws-mtop-r { margin-left: auto; display: flex; align-items: center; gap: 6px; }
.ws-mstrip { flex: none; display: flex; align-items: center; gap: 7px; padding: 8px 12px; overflow-x: auto;
  background: var(--background); border-bottom: 1px solid var(--container1-border); }
.ws-mstrip span { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--common);
