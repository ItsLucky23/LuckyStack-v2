name: ci

on:
  pull_request:
  push:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Generate type artifacts
        run: npm run generateArtifacts

      - name: Verify artifacts exist
        run: |
          test -s src/_sockets/apiTypes.generated.ts
          test -s src/docs/apiDocs.generated.json
          ls server/prod/generatedApis.*.ts

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test sweep
        run: npm run test

      - name: E2E (if installed)
        run: |
          if [ -f "node_modules/@vercel-labs/agent-browser/package.json" ]; then
            npm run test:e2e
          else
            echo "Skipping e2e — @vercel-labs/agent-browser not installed."
          fi
        continue-on-error: true
